global
  maxconn 20000
  nbthread 1
  tune.bufsize 16384
  hard-stop-after 1s

defaults
  mode http
  maxconn 20000
  timeout connect 50ms
  timeout client  10s
  timeout server  10s
  timeout http-request 2s
  timeout http-keep-alive 60s
  option http-keep-alive
  option forwardfor
  option dontlognull
  # Kernel-side splice() between client and server sockets when payloads are
  # large enough to benefit; cheap to leave on for small payloads since the
  # auto path falls back to userspace I/O.
  option splice-auto
  # Skip the deferred-accept dance and the initial connect ACK round-trip on
  # established TCP backends. Saves a syscall per accepted conn / connect.
  option tcp-smart-accept
  option tcp-smart-connect

frontend in
  bind :9999
  maxconn 20000
  default_backend apis

backend apis
  balance roundrobin
  http-reuse always
  option httpchk GET /ready
  http-check expect status 200
  # Unix domain sockets shave ~50µs of TCP loopback / handshake / NODELAY
  # bookkeeping per request vs. localhost TCP. The socket files live on a
  # tmpfs volume shared with the api1/api2 containers (see docker-compose).
  server api1 /sockets/api1.sock maxconn 10000 check inter 1s fall 2 rise 1
  server api2 /sockets/api2.sock maxconn 10000 check inter 1s fall 2 rise 1

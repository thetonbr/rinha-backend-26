global
  maxconn 4096
  nbthread 1

defaults
  mode http
  timeout connect 1s
  timeout client  10s
  timeout server  10s
  option http-keep-alive
  option forwardfor

frontend in
  bind :9999
  default_backend apis

backend apis
  balance roundrobin
  option httpchk GET /ready
  http-check expect status 200
  server api1 api1:8080 check inter 1s fall 2 rise 1
  server api2 api2:8080 check inter 1s fall 2 rise 1

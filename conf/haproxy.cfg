global
  maxconn 20000
  nbthread 1
  hard-stop-after 1s

defaults
  # Layer-7 mode with backend connection pooling. v17 mode tcp gave 5462,
  # v17 mode http gave 5446 — but that was with bbox-repair cap=∞ where
  # scan time dominated. With cap=8 (v19+) average request CPU drops well
  # below the LB overhead, so http-reuse always (which keeps a Unix socket
  # to the backend warm across many client requests) saves ~50-100 µs of
  # connect/accept per request in burst. Tracking the production leader
  # (thiagorigonatti/rinha-2026) which uses HAProxy mode http.
  mode http
  maxconn 20000
  timeout connect 50ms
  timeout client  60s
  timeout server  60s
  timeout http-request 2s
  timeout http-keep-alive 65s
  option http-keep-alive
  option dontlognull

frontend in
  bind :9999
  maxconn 20000
  default_backend apis

backend apis
  balance roundrobin
  http-reuse always
  # tcp-check (bare connect probe) rather than option httpchk: the http
  # health probe was racing the API's first multishot-accept SQE on local
  # WSL 5.15 smoke. The TCP probe stays correct and is what we used in
  # mode tcp.
  option tcp-check
  server api1 /sockets/api1.sock maxconn 10000 check inter 1s fall 2 rise 1
  server api2 /sockets/api2.sock maxconn 10000 check inter 1s fall 2 rise 1

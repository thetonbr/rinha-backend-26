global
  maxconn 4096
  nbthread 1

defaults
  mode http
  timeout connect 1s
  timeout client  10s
  timeout server  10s
  # End-to-end HTTP/1.1 keep-alive on both legs (client↔HAProxy↔api). The
  # Zig api re-arms read state after each response and HAProxy pools the
  # backend Unix socket, so the per-request cost is just one read + one
  # writev with no connect/accept overhead.
  option http-keep-alive
  option forwardfor

frontend in
  bind :9999
  default_backend apis

backend apis
  balance roundrobin
  option httpchk GET /ready
  http-check expect status 200
  # Unix domain sockets shave ~50µs of TCP loopback / handshake / NODELAY
  # bookkeeping per request vs. localhost TCP. The socket files live on a
  # tmpfs volume shared with the api1/api2 containers (see docker-compose).
  server api1 /sockets/api1.sock check inter 1s fall 2 rise 1
  server api2 /sockets/api2.sock check inter 1s fall 2 rise 1

global
  maxconn 20000
  nbthread 1
  tune.bufsize 16384
  hard-stop-after 1s

defaults
  # Layer-4 only: HAProxy splices client and backend sockets without parsing
  # the HTTP request line/headers. We trade away http-reuse pooling and
  # request-aware health checks for ~20-50 µs/req of saved CPU and a much
  # tighter latency tail (no per-request HTTP state machine, no header
  # buffering). Backends are Unix sockets so splice() degenerates to a
  # zero-copy fd pair entirely inside the kernel.
  mode tcp
  maxconn 20000
  timeout connect 50ms
  timeout client  60s
  timeout server  60s
  option dontlognull
  option splice-auto
  option tcp-smart-accept
  option tcp-smart-connect

frontend in
  bind :9999
  maxconn 20000
  default_backend apis

backend apis
  balance roundrobin
  # `option tcp-check` with no rules issues a bare connect() probe. The Zig
  # API replies to the TCP handshake immediately (listen() is up before any
  # request handling), so connect-success is sufficient evidence of
  # readiness. Losing the GET /ready 200 check is acceptable because the
  # backend has no slow-start path.
  option tcp-check
  server api1 /sockets/api1.sock maxconn 10000 check inter 1s fall 2 rise 1
  server api2 /sockets/api2.sock maxconn 10000 check inter 1s fall 2 rise 1

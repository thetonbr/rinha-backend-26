services:
  api1:
    image: thetonbr/rinha-zig-2026:v4
    environment:
      LISTEN_SOCKET_PATH: /sockets/api1.sock
    volumes:
      - sockets:/sockets:rw
    security_opt:
      - seccomp:unconfined
    deploy:
      resources:
        limits:
          cpus: "0.425"
          memory: "160M"
    networks:
      - rinha-net

  api2:
    image: thetonbr/rinha-zig-2026:v4
    environment:
      LISTEN_SOCKET_PATH: /sockets/api2.sock
    volumes:
      - sockets:/sockets:rw
    security_opt:
      - seccomp:unconfined
    deploy:
      resources:
        limits:
          cpus: "0.425"
          memory: "160M"
    networks:
      - rinha-net

  lb:
    image: haproxy:2.9-alpine
    volumes:
      - ./conf/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - sockets:/sockets:rw
    ports:
      - "9999:9999"
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.150"
          memory: "30M"
    networks:
      - rinha-net

volumes:
  sockets:

networks:
  rinha-net:
    driver: bridge

services:
  api1:
    build:
      context: .
      target: api
    environment:
      LISTEN_SOCKET_PATH: /sockets/api1.sock
    volumes:
      - sockets:/sockets:rw
    deploy:
      resources:
        limits:
          cpus: "0.425"
          memory: "160M"
    networks:
      - rinha-net

  api2:
    build:
      context: .
      target: api
    environment:
      LISTEN_SOCKET_PATH: /sockets/api2.sock
    volumes:
      - sockets:/sockets:rw
    deploy:
      resources:
        limits:
          cpus: "0.425"
          memory: "160M"
    networks:
      - rinha-net

  lb:
    image: haproxy:2.9-alpine
    volumes:
      - ./conf/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - sockets:/sockets:rw
    ports:
      - "9999:9999"
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.150"
          memory: "30M"
    networks:
      - rinha-net

# tmpfs-backed shared volume holding the Unix domain sockets. Bind-mounting a
# host directory would incur an extra fs roundtrip; an internal Compose volume
# stays in-memory and is recreated on every `up`.
volumes:
  sockets:

networks:
  rinha-net:
    driver: bridge
